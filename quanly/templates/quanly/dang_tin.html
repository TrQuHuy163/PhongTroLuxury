<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Tin Cho Thuê</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS cho form Django */
        form p { margin-bottom: 1.2rem; }
        form label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #374151; }
        form input, form textarea { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; transition: border-color 0.2s; }
        form input:focus, form textarea:focus { border-color: #2563eb; }
        form input[type="file"] { padding: 0.5rem; background: #f9fafb; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-3xl font-bold text-gray-900">Đăng Tin Mới</h2>
            <a href="{% url 'trang_chu' %}" class="text-blue-600 hover:underline">← Quay lại</a>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition mt-6 text-lg shadow-md">
                Đăng Tin Ngay
            </button>
        </form>
    </div>

</body>
</html>
