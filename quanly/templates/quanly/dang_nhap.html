<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cứu cánh giúp form mặc định của Django đẹp lên hợp với Tailwind */
        form p { margin-bottom: 1rem; }
        form label { display: block; font-weight: 500; margin-bottom: 0.25rem; color: #374151; }
        form input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
        .errorlist { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold text-gray-900">Đăng Nhập</h2>
            <p class="text-gray-500 mt-2">Chào mừng bạn quay lại TuiKyCuc</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition mt-4">
                Đăng Nhập
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-600 mt-6">
            Chưa có tài khoản? <a href="{% url 'dang_ky' %}" class="text-blue-600 font-semibold hover:underline">Đăng ký ngay</a>
        </p>
    </div>

</body>
</html>
